<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈ Pilot Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --white:#ffffff;
  --bg:#f7f9fc;
  --bg2:#eef2f7;
  --blue-deep:#0a3d6b;
  --blue:#1565c0;
  --blue-mid:#1e88e5;
  --blue-light:#42a5f5;
  --blue-pale:#e3f2fd;
  --blue-pale2:#bbdefb;
  --sky:#64b5f6;
  --accent:#0288d1;
  --text:#1a2332;
  --text2:#4a6080;
  --text3:#8fa8c0;
  --border:#dde6f0;
  --border2:#c5d8ec;
  --green:#2e7d32;
  --green-bg:#e8f5e9;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 2px 8px rgba(10,61,107,0.10), 0 1px 3px rgba(10,61,107,0.06);
  --shadow-sm:0 1px 3px rgba(10,61,107,0.08);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:18px;
  line-height:1.65;
  min-height:100vh;
}

/* ── HERO ── */
.hero{
  position:relative;height:280px;overflow:hidden;
  border-radius:0 0 28px 28px;
}
.hero img{
  width:100%;height:100%;
  object-fit:cover;object-position:center 35%;display:block;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(10,61,107,0.18) 0%, rgba(10,61,107,0.62) 100%);
}
.hero-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:flex-start;justify-content:flex-end;
  padding:2rem 2.5rem;
}
.hero-title{
  font-family:'DM Serif Display',serif;
  font-size:36px;font-weight:400;
  color:#fff;line-height:1.2;margin-bottom:5px;
}
.hero-sub{
  font-size:14px;color:rgba(255,255,255,0.78);letter-spacing:0.3px;
}

/* ── WRAP ── */
.wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;}

/* ── EXAM CARD ── */
.exam-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-sm);
  padding:1.1rem 1.5rem;
  display:flex;align-items:center;gap:14px;
  margin-bottom:1.75rem;flex-wrap:wrap;
}
.exam-icon{font-size:22px;line-height:1;}
.exam-lbl{font-size:15px;color:var(--text2);flex:1;min-width:120px;}
.config-input{
  font-size:15px;padding:8px 12px;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  outline:none;transition:border-color .2s;width:170px;
}
.config-input:focus{border-color:var(--blue-mid);}
.set-btn{
  font-size:15px;font-weight:500;padding:8px 22px;
  border-radius:var(--radius-sm);background:var(--blue);
  color:#fff;border:none;cursor:pointer;transition:background .18s;
}
.set-btn:hover{background:var(--blue-deep);}

/* ── COUNTDOWN ── */
.countdown{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;margin-bottom:2rem;
}
.cd-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-sm);
  padding:1.25rem 1rem 1rem;text-align:center;
  position:relative;overflow:hidden;
}
.cd-card::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));
}
.cd-num{
  font-size:46px;font-weight:600;line-height:1;
  color:var(--blue-deep);letter-spacing:-1px;
}
.cd-label{
  font-size:12px;color:var(--text3);text-transform:uppercase;
  letter-spacing:1.5px;margin-top:6px;font-weight:500;
}

/* ── SECTION LABEL ── */
.sec-label{
  font-size:13px;font-weight:600;color:var(--accent);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2);}

/* ── PHASES ── */
.phases{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;margin-bottom:2rem;
}
.phase-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-sm);
  padding:1.1rem 1.25rem;
  transition:box-shadow .2s,border-color .2s;
}
.phase-card:hover{box-shadow:var(--shadow);border-color:var(--border2);}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px;}
.ph-name{font-size:14px;font-weight:600;color:var(--text2);}
.ph-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.badge-active{background:var(--green-bg);color:var(--green);}
.badge-upcoming{background:var(--bg2);color:var(--text3);}
.badge-done{background:var(--blue-pale);color:var(--accent);}
.ph-weeks{font-size:32px;font-weight:600;color:var(--blue-deep);line-height:1.1;}
.ph-sub{font-size:13px;color:var(--text3);margin-top:2px;}
.ph-bar-bg{height:4px;background:var(--bg2);border-radius:4px;margin-top:12px;}
.ph-bar-fill{height:4px;border-radius:4px;transition:width .5s ease;}

/* ── STATS ── */
.stats{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;margin-bottom:2rem;
}
.stat-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-sm);
  padding:1.1rem 1.25rem;
}
.stat-num{font-size:34px;font-weight:600;color:var(--blue);line-height:1;}
.stat-lbl{font-size:14px;color:var(--text2);margin-top:4px;}

/* ── TABS ── */
.month-tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{
  font-size:15px;font-weight:500;padding:7px 20px;border-radius:20px;cursor:pointer;
  background:var(--white);color:var(--text2);
  border:1px solid var(--border2);transition:all .15s;
}
.tab:hover{border-color:var(--blue-light);color:var(--blue);}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── PROGRESS BAR ── */
.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
.prog-bg{flex:1;height:8px;background:var(--bg2);border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));transition:width .35s ease;}
.prog-txt{font-size:15px;font-weight:600;color:var(--blue);min-width:40px;text-align:right;}

/* ── NOTICE ── */
.notice{
  font-size:14px;color:var(--text2);
  background:var(--blue-pale);border:1px solid var(--blue-pale2);
  border-radius:var(--radius-sm);padding:10px 16px;margin-bottom:1.25rem;
}

/* ── CHECKLIST ── */
.week-block{margin-bottom:1.5rem;}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.week-lbl{font-size:14px;font-weight:600;color:var(--text2);}
.week-tag{
  font-size:12px;padding:3px 10px;border-radius:20px;
  background:var(--blue-pale);color:var(--accent);font-weight:500;
}
.week-tag.past{background:var(--bg2);color:var(--text3);}
.week-prog-mini{font-size:13px;color:var(--text3);}

.day-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:var(--radius-sm);
  border:1px solid transparent;
  transition:background .12s,border-color .12s;
}
.day-row:hover{background:var(--blue-pale);border-color:var(--blue-pale2);}

.check-box{
  width:20px;height:20px;min-width:20px;
  border:2px solid var(--border2);border-radius:5px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;background:var(--white);
}
.check-box:hover{border-color:var(--blue-mid);}
.check-box.done{background:var(--blue-mid);border-color:var(--blue-mid);}
.check-tick{display:none;width:11px;height:11px;}
.check-box.done .check-tick{display:block;}

.day-name{font-size:15px;font-weight:600;color:var(--text2);min-width:64px;}
.day-task{font-size:17px;color:var(--text);flex:1;}
.day-task.rest{color:var(--text3);font-style:italic;font-size:15px;}
.day-task.done-text{text-decoration:line-through;color:var(--text3);}

.past-lbl{
  font-size:13px;font-weight:500;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.5px;margin:1.5rem 0 .75rem;
}

.divider{height:1px;background:var(--border);margin:2rem 0;}
</style>
</head>
<body>

<div class="hero">
  <img
    src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1400&q=85&auto=format&fit=crop"
    alt="Airplane wing over clouds"
    onerror="this.parentElement.style.background='linear-gradient(135deg,#1565c0 0%,#42a5f5 100%)';this.style.display='none'"
  >
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-title">Pilot Study Planner</div>
    <div class="hero-sub">✈ Aptitude Test Preparation — 4 Month Programme</div>
  </div>
</div>

<div class="wrap">

  <div class="exam-card">
    <div class="exam-icon">📅</div>
    <div class="exam-lbl">ตั้งวันสอบเพื่อเริ่มนับถอยหลัง</div>
    <input type="date" id="examDate" class="config-input">
    <button class="set-btn" onclick="setExamDate()">ตั้งค่า</button>
  </div>

  <div class="countdown">
    <div class="cd-card"><div class="cd-num" id="cd-days">—</div><div class="cd-label">วัน</div></div>
    <div class="cd-card"><div class="cd-num" id="cd-hours">—</div><div class="cd-label">ชั่วโมง</div></div>
    <div class="cd-card"><div class="cd-num" id="cd-mins">—</div><div class="cd-label">นาที</div></div>
    <div class="cd-card"><div class="cd-num" id="cd-secs">—</div><div class="cd-label">วินาที</div></div>
  </div>

  <div class="sec-label">Phase Progress</div>
  <div class="phases" id="phases-grid"></div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-weeks">0</div><div class="stat-lbl">สัปดาห์ที่บันทึก</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pct">0%</div><div class="stat-lbl">progress รวม</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">สัปดาห์ครบติดต่อกัน</div></div>
  </div>

  <div class="sec-label">Weekly Checklist</div>
  <div class="month-tabs" id="month-tabs"></div>
  <div class="notice" id="week-notice"></div>
  <div class="prog-row">
    <div class="prog-bg"><div class="prog-fill" id="week-prog-fill" style="width:0%"></div></div>
    <span class="prog-txt" id="week-prog-txt">0%</span>
  </div>
  <div id="checklist-body"></div>

</div>

<script>
const MONTHS=[
  {id:'m1',label:'เดือน 1 — Pattern',days:[
    {d:'จันทร์',t:'Part 1 Series Picture'},
    {d:'อังคาร',t:'Part 4 Series Number'},
    {d:'พุธ',t:'Part 5 พับกล่อง'},
    {d:'พฤหัส',t:'Part 2 ประกอบรูป'},
    {d:'ศุกร์',t:'Part 3 Error ID + Part 7 Similarity'},
    {d:'เสาร์',t:'Part 6 Memory (ฝึกจำ)'},
    {d:'อาทิตย์',t:'พัก',rest:true},
  ]},
  {id:'m2',label:'เดือน 2 — ความเร็ว',days:[
    {d:'จันทร์',t:'Part 1 Series Picture (จับเวลา)'},
    {d:'อังคาร',t:'Part 4 Series Number (จับเวลา)'},
    {d:'พุธ',t:'Part 5 พับกล่อง (จับเวลา)'},
    {d:'พฤหัส',t:'Part 2 ประกอบรูป (จับเวลา)'},
    {d:'ศุกร์',t:'Part 3 Error ID + Part 7 Similarity (จับเวลา)'},
    {d:'เสาร์',t:'Part 6 Memory — ฝึกจำความเร็ว'},
    {d:'อาทิตย์',t:'พัก',rest:true},
  ]},
  {id:'m3',label:'เดือน 3 — Mock Test',days:[
    {d:'จันทร์',t:'Part ที่อ่อนสุด เจาะลึก'},
    {d:'อังคาร',t:'Part ที่อ่อนสุด เจาะลึก'},
    {d:'พุธ',t:'Mock test เต็ม (ทุก Part ต่อเนื่อง)'},
    {d:'พฤหัส',t:'Review ข้อที่ผิด'},
    {d:'ศุกร์',t:'Part ที่อ่อนสุด'},
    {d:'เสาร์',t:'Mock test เต็ม อีกรอบ'},
    {d:'อาทิตย์',t:'พัก',rest:true},
  ]},
  {id:'m4',label:'เดือน 4 — รักษาฟอร์ม',days:[
    {d:'จันทร์',t:'Mock test + เจาะจุดอ่อน'},
    {d:'อังคาร',t:'Mock test + เจาะจุดอ่อน'},
    {d:'พุธ',t:'Review ข้อที่ผิด'},
    {d:'พฤหัส',t:'Mock test รอบที่ 2'},
    {d:'ศุกร์',t:'Part ที่ยังอ่อน'},
    {d:'เสาร์',t:'Mock test เต็ม'},
    {d:'อาทิตย์',t:'พัก',rest:true},
  ]},
];

let examDate=null,checks={},activeMonth='m1';

function getISOWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}W${String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0')}`;
}
function cwk(){return getISOWeek(new Date());}

function loadState(){
  try{const s=localStorage.getItem('pilot_clean2');if(s){const p=JSON.parse(s);examDate=p.examDate?new Date(p.examDate):null;checks=p.checks||{};}}catch(e){}
  if(examDate)document.getElementById('examDate').value=examDate.toISOString().split('T')[0];
}
function saveState(){
  try{localStorage.setItem('pilot_clean2',JSON.stringify({examDate:examDate?examDate.toISOString():null,checks}));}catch(e){}
}
function setExamDate(){
  const v=document.getElementById('examDate').value;
  if(!v)return;
  examDate=new Date(v+'T08:00:00');
  saveState();renderPhases();updateStats();
}

function updateCountdown(){
  if(!examDate){['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id=>document.getElementById(id).textContent='—');return;}
  const diff=examDate.getTime()-Date.now();
  if(diff<=0){['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id=>document.getElementById(id).textContent='0');return;}
  document.getElementById('cd-days').textContent=Math.floor(diff/86400000);
  document.getElementById('cd-hours').textContent=Math.floor((diff%86400000)/3600000);
  document.getElementById('cd-mins').textContent=Math.floor((diff%3600000)/60000);
  document.getElementById('cd-secs').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}

function renderPhases(){
  const grid=document.getElementById('phases-grid');
  const totalDays=examDate?Math.max(0,(examDate-Date.now())/86400000):null;
  const phases=[
    {name:'Phase 1 — เรียนรู้ Pattern',maxDays:112,minDays:84,color:'#2e7d32'},
    {name:'Phase 2 — เพิ่มความเร็ว',maxDays:84,minDays:56,color:'#1565c0'},
    {name:'Phase 3 — Mock Test',maxDays:56,minDays:28,color:'#e65100'},
    {name:'Phase 4 — รักษาฟอร์ม',maxDays:28,minDays:0,color:'#6a1b9a'},
  ];
  grid.innerHTML=phases.map(p=>{
    let badge='<span class="ph-badge badge-upcoming">รอ</span>',wl='—',pct=0;
    if(totalDays!==null){
      if(totalDays>p.maxDays){pct=0;}
      else if(totalDays<=p.minDays){badge='<span class="ph-badge badge-done">เสร็จ</span>';pct=100;}
      else{
        badge='<span class="ph-badge badge-active">กำลังอ่าน</span>';
        wl=Math.ceil(totalDays/7);
        pct=Math.round(Math.max(0,Math.min(100,(p.maxDays-totalDays)/(p.maxDays-p.minDays)*100)));
      }
    }
    return `<div class="phase-card">
      <div class="ph-top"><span class="ph-name">${p.name}</span>${badge}</div>
      <div class="ph-weeks">${wl==='—'?'—':wl+' สัปดาห์'}</div>
      <div class="ph-sub">เหลือเวลา</div>
      <div class="ph-bar-bg"><div class="ph-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;
  }).join('');
}

function renderMonthTabs(){
  document.getElementById('month-tabs').innerHTML=MONTHS.map(m=>
    `<div class="tab${m.id===activeMonth?' active':''}" onclick="switchMonth('${m.id}')">${m.label.split('—')[0].trim()}</div>`
  ).join('');
}
function switchMonth(id){activeMonth=id;renderMonthTabs();renderChecklist();}

function ck(mid,wk,di){return`${mid}_${wk}_d${di}`;}

function renderChecklist(){
  const body=document.getElementById('checklist-body');
  const month=MONTHS.find(m=>m.id===activeMonth);
  const wk=cwk();
  const pastWeeks=[...new Set(
    Object.keys(checks).filter(k=>k.startsWith(activeMonth+'_')&&!k.includes(wk)).map(k=>k.split('_')[1])
  )].sort().reverse().slice(0,3);

  document.getElementById('week-notice').textContent=
    `สัปดาห์นี้: ${wk} — checklist รีเซ็ตทุกต้นสัปดาห์ แต่ progress สะสมจากทุกสัปดาห์ที่ผ่านมา`;

  let html=renderWeekBlock(month,wk,true);
  if(pastWeeks.length){
    html+=`<div class="past-lbl">สัปดาห์ที่ผ่านมา</div>`;
    pastWeeks.forEach(pw=>{html+=renderWeekBlock(month,pw,false);});
  }
  body.innerHTML=html;
  updateWeekProgress();
}

function renderWeekBlock(month,wk,isCurrent){
  const taskDays=month.days.filter(d=>!d.rest);
  const done=taskDays.filter(d=>checks[ck(month.id,wk,month.days.indexOf(d))]).length;
  const dis=isCurrent?'':'opacity:.45;pointer-events:none;';
  let html=`<div class="week-block" style="${dis}">
    <div class="week-hdr">
      <span class="week-lbl">${isCurrent?'สัปดาห์ปัจจุบัน':wk}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="week-prog-mini">${done}/${taskDays.length} tasks</span>
        <span class="week-tag${isCurrent?'':' past'}">${isCurrent?'สัปดาห์นี้':wk}</span>
      </div>
    </div>`;
  month.days.forEach((day,di)=>{
    const key=ck(month.id,wk,di);
    const isDone=!!checks[key];
    html+=`<div class="day-row" id="row_${key}">
      <div class="check-box${isDone?' done':''}" onclick="toggleCheck('${key}')">
        <svg class="check-tick" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="day-name">${day.d}</span>
      <span class="day-task${day.rest?' rest':''}${isDone?' done-text':''}">${day.t}</span>
    </div>`;
  });
  return html+'</div>';
}

function toggleCheck(key){
  checks[key]=!checks[key];saveState();
  const row=document.getElementById('row_'+key);
  if(row){
    row.querySelector('.check-box').classList.toggle('done',checks[key]);
    row.querySelector('.day-task').classList.toggle('done-text',checks[key]);
  }
  updateWeekProgress();updateStats();
}

function updateWeekProgress(){
  const month=MONTHS.find(m=>m.id===activeMonth);
  const wk=cwk();
  const taskDays=month.days.filter(d=>!d.rest);
  const done=taskDays.filter(d=>checks[ck(month.id,wk,month.days.indexOf(d))]).length;
  const pct=taskDays.length?Math.round(done/taskDays.length*100):0;
  document.getElementById('week-prog-fill').style.width=pct+'%';
  document.getElementById('week-prog-txt').textContent=pct+'%';
}

function updateStats(){
  const allWeeks=new Set(Object.keys(checks).filter(k=>checks[k]).map(k=>k.split('_').slice(0,2).join('_')));
  document.getElementById('stat-weeks').textContent=allWeeks.size;
  let total=0,done=0;
  MONTHS.forEach(m=>{
    const taskDays=m.days.filter(d=>!d.rest);
    const weeks=[...new Set(Object.keys(checks).filter(k=>k.startsWith(m.id+'_')).map(k=>k.split('_')[1]))];
    const wk=cwk();
    const all=weeks.includes(wk)?weeks:[...weeks,wk];
    all.forEach(w=>{taskDays.forEach(day=>{total++;if(checks[ck(m.id,w,m.days.indexOf(day))])done++;});});
  });
  document.getElementById('stat-pct').textContent=total?Math.round(done/total*100)+'%':'0%';
  let streak=0;
  const today=new Date();
  for(let i=0;i<16;i++){
    const d=new Date(today);d.setDate(d.getDate()-i*7);
    const wk=getISOWeek(d);
    const ok=MONTHS.every(m=>{
      const td=m.days.filter(day=>!day.rest);
      return td.every(day=>checks[ck(m.id,wk,m.days.indexOf(day))]);
    });
    if(ok)streak++;else break;
  }
  document.getElementById('stat-streak').textContent=streak;
}

loadState();renderPhases();renderMonthTabs();renderChecklist();updateStats();
setInterval(updateCountdown,1000);updateCountdown();
</script>
